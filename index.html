<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智聯書籤系統 - Professional Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
            --text: #1e293b;
            --folder-bg: #f8fafc;
            --tag-bg: #e0f2fe;
            --tag-text: #0369a1;
            --danger: #ef4444;
            --success: #10b981;
            --gray: #64748b;
        }

        body { font-family: "Segoe UI", sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: relative; }

        .header-bar { border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 20px; }
        .status-badge { font-size: 12px; padding: 4px 10px; border-radius: 4px; background: #e2e8f0; color: var(--gray); font-weight: 600; }
        
        /* 版本號顯示 */
        .version-info { font-size: 11px; color: #cbd5e1; position: absolute; bottom: 10px; right: 20px; }

        .search-box { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; }
        .controls { display: flex; gap: 8px; margin-bottom: 15px; }
        button { cursor: pointer; border: none; border-radius: 6px; padding: 8px 16px; font-weight: 600; transition: 0.2s; }
        .btn-add { background: var(--primary); color: white; }
        .btn-sync { background: var(--success); color: white; }

        /* 列表樣式 */
        .folder-node { margin: 15px 0; border: 1px solid #e2e8f0; border-radius: 8px; background: var(--folder-bg); }
        .folder-header { padding: 10px 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; background: #f1f5f9; cursor: pointer; }
        .folder-children { min-height: 20px; padding: 5px 5px 15px 25px; background: white; }
        .link-node { padding: 10px 15px; margin: 5px 0; border: 1px solid #f1f5f9; border-radius: 8px; display: flex; align-items: center; background: white; }
        .link-node a { text-grow: 1; flex-grow: 1; text-decoration: none; color: var(--primary); font-weight: 500; }
        .tag-item { background: var(--tag-bg); color: var(--tag-text); font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-left: 4px; }
        
        .action-btns { display: flex; gap: 5px; opacity: 0.3; }
        .link-node:hover .action-btns, .folder-header:hover .action-btns { opacity: 1; }
        .btn-edit-icon { background: none; color: var(--gray); font-size: 14px; padding: 2px; }

        /* 編輯對話框 (Modal) */
        #editModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; justify-content: center; align-items: center; }
        .modal-body { background: white; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-body h3 { margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: var(--gray); }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        
        .ghost { opacity: 0.2; background: #dbeafe !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar">
        <h1>智聯書籤系統 <span id="verDisplay" style="font-size: 14px; color: var(--gray);">v2.6</span></h1>
        <div id="syncStatus" class="status-badge">載入中...</div>
        <input type="text" id="searchInput" class="search-box" placeholder="搜尋書籤..." oninput="refreshUI()">
        <div class="controls">
            <button class="btn-add" onclick="addNewItem('folder')">📁 資料夾</button>
            <button class="btn-add" onclick="addNewItem('link')">🔗 書籤</button>
            <button class="btn-sync" onclick="manualSync()">☁️ 同步雲端</button>
        </div>
    </div>

    <div id="tree-root" class="folder-children"></div>
    <div class="version-info" id="footerVer">Revision: 0</div>
</div>

<div id="editModal">
    <div class="modal-body">
        <h3 id="modalTitle">編輯書籤</h3>
        <div class="form-group">
            <label>名稱</label>
            <input type="text" id="editName">
        </div>
        <div class="form-group" id="urlGroup">
            <label>網址</label>
            <input type="text" id="editUrl">
        </div>
        <div class="form-group" id="tagGroup">
            <label>標籤 (用逗號隔開)</label>
            <input type="text" id="editTags">
        </div>
        <div class="modal-footer">
            <button onclick="closeEditModal()" style="background:#eee;">取消</button>
            <button onclick="saveEdit()" style="background:var(--primary); color:white;">儲存修改</button>
        </div>
    </div>
</div>

<script>
    const SB_URL = 'https://qnceyxqpkqvjucalufma.supabase.co';
    const SB_KEY = 'sb_publishable_3CSAHSwlwROSPgZJ0kdDTA_xP6iXDf-';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let bookmarkTree = [];
    let currentVersion = 0;
    let editingId = null;
    const rootEl = document.getElementById('tree-root');

    async function init() {
        try {
            const { data, error } = await supabaseClient.from('bookmark_data').select('*').eq('id', 1);
            if (data && data[0]) {
                bookmarkTree = data[0].tree_json;
                // 從資料庫讀取版本號，若無則設為 0
                currentVersion = data[0].version || 0;
            }
            updateVersionDisplay();
            refreshUI();
            updateStatus("✅ 同步成功", "success");
        } catch (err) {
            updateStatus("❌ 失敗: " + err.message, "danger");
        }
    }

    function updateVersionDisplay() {
        document.getElementById('verDisplay').innerText = `v${(2.6 + currentVersion * 0.01).toFixed(2)}`;
        document.getElementById('footerVer').innerText = `Revision: ${currentVersion}`;
    }

    function refreshUI() {
        render(bookmarkTree, rootEl, document.getElementById('searchInput').value);
    }

    function render(nodes, container, keyword = "") {
        container.innerHTML = '';
        const kw = keyword.toLowerCase();
        nodes.forEach(node => {
            const isMatch = node.name.toLowerCase().includes(kw) || (node.url && node.url.toLowerCase().includes(kw));
            if (node.type === 'folder') {
                const el = document.createElement('div');
                el.className = 'folder-node';
                el.dataset.id = node.id; el.dataset.type = 'folder'; el.dataset.name = node.name;
                el.innerHTML = `<div class="folder-header"><span>📂 ${node.name}</span>
                    <div class="action-btns">
                        <button class="btn-edit-icon" onclick="openEditModal('${node.id}')">✏️</button>
                        <button class="btn-edit-icon" onclick="deleteNode('${node.id}')">🗑️</button>
                    </div>
                </div><div class="folder-children"></div>`;
                render(node.children, el.querySelector('.folder-children'), keyword);
                container.appendChild(el);
            } else {
                if (keyword && !isMatch) return;
                const el = document.createElement('div');
                el.className = 'link-node';
                el.dataset.id = node.id; el.dataset.type = 'link'; el.dataset.name = node.name;
                el.dataset.url = node.url; el.dataset.tags = JSON.stringify(node.tags || []);
                const tagsHtml = (node.tags || []).map(t => `<span class="tag-item">#${t}</span>`).join('');
                el.innerHTML = `<span>🔗</span><a href="${node.url}" target="_blank">${node.name}</a><div>${tagsHtml}</div>
                    <div class="action-btns">
                        <button class="btn-edit-icon" onclick="openEditModal('${node.id}')">✏️</button>
                        <button class="btn-edit-icon" onclick="deleteNode('${node.id}')">🗑️</button>
                    </div>`;
                container.appendChild(el);
            }
        });
        setupSortable();
    }

    // --- 整合編輯功能 ---
    function openEditModal(id) {
        editingId = id;
        const node = findNode(bookmarkTree, id);
        if (!node) return;

        document.getElementById('editName').value = node.name;
        if (node.type === 'link') {
            document.getElementById('urlGroup').style.display = 'block';
            document.getElementById('tagGroup').style.display = 'block';
            document.getElementById('editUrl').value = node.url;
            document.getElementById('editTags').value = (node.tags || []).join(', ');
            document.getElementById('modalTitle').innerText = '編輯書籤';
        } else {
            document.getElementById('urlGroup').style.display = 'none';
            document.getElementById('tagGroup').style.display = 'none';
            document.getElementById('modalTitle').innerText = '編輯資料夾';
        }
        document.getElementById('editModal').style.display = 'flex';
    }

    function closeEditModal() {
        document.getElementById('editModal').style.display = 'none';
        editingId = null;
    }

    function saveEdit() {
        const node = findNode(bookmarkTree, editingId);
        if (node) {
            node.name = document.getElementById('editName').value;
            if (node.type === 'link') {
                node.url = document.getElementById('editUrl').value;
                node.tags = document.getElementById('editTags').value.split(',').map(x => x.trim()).filter(x => x !== "");
            }
            // 每次儲存遞增版本號
            currentVersion++;
            refreshUI();
            syncToCloud();
            closeEditModal();
        }
    }

    function findNode(list, id) {
        for (let n of list) {
            if (n.id === id) return n;
            if (n.children) { const found = findNode(n.children, id); if (found) return found; }
        }
        return null;
    }

    async function syncToCloud() {
        updateStatus("🔄 同步版本 " + currentVersion, "info");
        const dataToSave = buildDataFromUI(rootEl);
        const { error } = await supabaseClient.from('bookmark_data').upsert({ 
            id: 1, 
            tree_json: dataToSave, 
            version: currentVersion, 
            updated_at: new Date() 
        });
        if (!error) {
            updateStatus("✅ 已儲存 v" + currentVersion, "success");
            bookmarkTree = dataToSave;
            updateVersionDisplay();
        }
    }

    // 其餘輔助功能
    function buildDataFromUI(container) {
        return Array.from(container.children).map(el => {
            const node = { id: el.dataset.id, type: el.dataset.type, name: el.dataset.name };
            if (node.type === 'folder') node.children = buildDataFromUI(el.querySelector('.folder-children'));
            else { node.url = el.dataset.url; node.tags = JSON.parse(el.dataset.tags || "[]"); }
            return node;
        });
    }

    function setupSortable() {
        document.querySelectorAll('.folder-children').forEach(el => {
            new Sortable(el, { group: 'nested', animation: 150, ghostClass: 'ghost', onEnd: syncToCloud });
        });
    }

    function addNewItem(type) {
        const name = prompt(type === 'link' ? "書籤名稱:" : "資料夾名稱:");
        if (!name) return;
        const newItem = { id: 'idx_' + Date.now(), type: type, name: name };
        if (type === 'link') {
            newItem.url = "https://";
            newItem.tags = [];
        } else newItem.children = [];
        bookmarkTree.unshift(newItem);
        currentVersion++; // 新增也算一個版本
        refreshUI();
        syncToCloud();
    }

    function deleteNode(id) {
        if (confirm("確定刪除？")) {
            const remove = (list) => {
                const i = list.findIndex(n => n.id === id);
                if (i > -1) { list.splice(i, 1); return true; }
                return list.some(n => n.children && remove(n.children));
            };
            remove(bookmarkTree);
            currentVersion++;
            refreshUI();
            syncToCloud();
        }
    }

    function updateStatus(t, s) { 
        const el = document.getElementById('syncStatus');
        el.innerText = t; 
        el.style.background = s === "success" ? "#dcfce7" : s === "danger" ? "#fee2e2" : "#e2e8f0"; 
    }

    function manualSync() { syncToCloud(); }

    init();
</script>
</body>
</html>
