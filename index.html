<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智聯書籤系統 - Bookmark Editor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
            --text: #1e293b;
            --folder-bg: #f8fafc;
            --tag-bg: #e0f2fe;
            --tag-text: #0369a1;
            --danger: #ef4444;
            --success: #10b981;
            --gray: #64748b;
        }

        body { font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.5; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }

        .header-bar { border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 20px; }
        .status-badge { font-size: 12px; padding: 4px 10px; border-radius: 4px; background: #e2e8f0; color: var(--gray); margin-bottom: 10px; display: inline-block; font-weight: 600; }
        
        .search-box { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; outline: none; }

        .controls { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        button { cursor: pointer; border: none; border-radius: 6px; padding: 8px 14px; font-weight: 600; transition: all 0.2s; font-size: 14px; display: flex; align-items: center; gap: 4px; }
        .btn-add { background: var(--primary); color: white; }
        .btn-sync { background: var(--success); color: white; }
        .btn-tag-toggle { background: var(--gray); color: white; }

        /* 標籤面板 */
        #tagPanel { display: none; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag-pill { background: white; border: 1px solid #cbd5e1; padding: 4px 12px; border-radius: 99px; font-size: 13px; cursor: pointer; }
        .tag-pill.active { background: var(--primary); color: white; }

        /* 書籤內容 */
        .folder-node { margin: 15px 0; border: 1px solid #e2e8f0; border-radius: 8px; background: var(--folder-bg); }
        .folder-header { cursor: pointer; padding: 12px 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; background: #f1f5f9; }
        .folder-children { min-height: 40px; padding: 5px 5px 15px 25px; background: white; border-top: 1px solid #f1f5f9; }
        
        .link-node { padding: 10px 15px; margin: 6px 0; background: white; border: 1px solid #f1f5f9; border-radius: 8px; display: flex; align-items: center; }
        .link-node a { text-decoration: none; color: var(--primary); flex-grow: 1; font-weight: 500; font-size: 15px; }
        
        .tag-item { background: var(--tag-bg); color: var(--tag-text); font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-left: 4px; font-weight: bold; }
        
        /* 功能按鈕組 */
        .action-btns { display: flex; gap: 5px; margin-left: 10px; opacity: 0.6; transition: 0.3s; }
        .link-node:hover .action-btns { opacity: 1; }
        .btn-icon { background: none; color: var(--gray); font-size: 16px; padding: 4px; }
        .btn-icon:hover { color: var(--primary); }
        .btn-icon.del:hover { color: var(--danger); }

        .ghost { opacity: 0.2; background: #dbeafe !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar">
        <h1>智聯書籤系統 v2.5</h1>
        <div id="syncStatus" class="status-badge">資料載入中...</div>
        <input type="text" id="searchInput" class="search-box" placeholder="搜尋書籤..." oninput="refreshUI()">
        <div class="controls">
            <button class="btn-add" onclick="addNewItem('folder')">📁 資料夾</button>
            <button class="btn-add" onclick="addNewItem('link')">🔗 書籤</button>
            <button id="tagBtn" class="btn-tag-toggle" onclick="toggleTagPanel()">🏷️ 標籤篩選</button>
            <button class="btn-sync" onclick="manualSync()">☁️ 同步雲端</button>
        </div>
    </div>

    <div id="tagPanel">
        <div style="font-size: 13px; font-weight: bold; margin-bottom: 10px; color: var(--gray); display: flex; justify-content: space-between;">
            <span>過濾標籤：</span>
            <span style="cursor:pointer; color: var(--primary);" onclick="clearFilter()">清除</span>
        </div>
        <div id="tagCloud" class="tag-cloud"></div>
    </div>
    
    <div id="tree-root" class="folder-children"></div>
</div>

<script>
    const SB_URL = 'https://qnceyxqpkqvjucalufma.supabase.co';
    const SB_KEY = 'sb_publishable_3CSAHSwlwROSPgZJ0kdDTA_xP6iXDf-';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let bookmarkTree = [];
    let activeTag = null;
    const rootEl = document.getElementById('tree-root');
    const statusEl = document.getElementById('syncStatus');

    async function init() {
        try {
            updateStatus("⏳ 連線資料庫...", "info");
            const { data, error } = await supabaseClient.from('bookmark_data').select('tree_json').eq('id', 1);
            if (error) throw error;
            if (data && data.length > 0) bookmarkTree = data[0].tree_json;
            else bookmarkTree = [{ id: "def_1", type: "folder", name: "我的書籤", children: [] }];
            updateStatus("✅ 雲端已同步", "success");
            refreshUI();
        } catch (err) {
            updateStatus("❌ 失敗: " + err.message, "danger");
            bookmarkTree = JSON.parse(localStorage.getItem('bk_backup')) || [];
            refreshUI();
        }
    }

    function toggleTagPanel() {
        const panel = document.getElementById('tagPanel');
        panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
        if (panel.style.display === 'block') updateTagCloud();
    }

    function updateTagCloud() {
        const tagsMap = {};
        const scan = (nodes) => { nodes.forEach(n => { if (n.tags) n.tags.forEach(t => tagsMap[t] = (tagsMap[t] || 0) + 1); if (n.children) scan(n.children); }); };
        scan(bookmarkTree);
        const cloud = document.getElementById('tagCloud');
        cloud.innerHTML = '';
        Object.keys(tagsMap).sort().forEach(tag => {
            const pill = document.createElement('div');
            pill.className = `tag-pill ${activeTag === tag ? 'active' : ''}`;
            pill.innerHTML = `${tag} <span style="opacity:0.5; font-size:10px">${tagsMap[tag]}</span>`;
            pill.onclick = () => { activeTag = (activeTag === tag) ? null : tag; refreshUI(); };
            cloud.appendChild(pill);
        });
    }

    function refreshUI() {
        const kw = document.getElementById('searchInput').value;
        render(bookmarkTree, rootEl, kw, activeTag);
        if (document.getElementById('tagPanel').style.display === 'block') updateTagCloud();
    }

    function render(nodes, container, keyword = "", tagFilter = null) {
        container.innerHTML = '';
        const kw = keyword.toLowerCase();
        nodes.forEach(node => {
            const isTagMatch = tagFilter ? (node.tags && node.tags.includes(tagFilter)) : true;
            const isTextMatch = node.name.toLowerCase().includes(kw) || (node.url && node.url.toLowerCase().includes(kw));
            if (node.type === 'folder') {
                const el = document.createElement('div');
                el.className = 'folder-node';
                el.dataset.id = node.id; el.dataset.type = 'folder'; el.dataset.name = node.name;
                el.innerHTML = `<div class="folder-header"><span>📂 ${node.name}</span>
                    <div class="action-btns">
                        <button class="btn-icon" onclick="editNode('${node.id}')" title="重命名">✏️</button>
                        <button class="btn-icon del" onclick="deleteNode('${node.id}')" title="刪除">🗑️</button>
                    </div>
                </div><div class="folder-children"></div>`;
                const childWrap = el.querySelector('.folder-children');
                render(node.children, childWrap, keyword, tagFilter);
                if ((keyword || tagFilter) && childWrap.innerHTML === '' && !isTextMatch) return;
                container.appendChild(el);
            } else {
                if ((keyword || tagFilter) && !(isTextMatch && isTagMatch)) return;
                const el = document.createElement('div');
                el.className = 'link-node';
                el.dataset.id = node.id; el.dataset.type = 'link'; el.dataset.name = node.name;
                el.dataset.url = node.url; el.dataset.tags = JSON.stringify(node.tags || []);
                const tagsHtml = (node.tags || []).map(t => `<span class="tag-item">#${t}</span>`).join('');
                el.innerHTML = `<span>🔗</span><a href="${node.url}" target="_blank">${node.name}</a>
                    <div style="display:flex">${tagsHtml}</div>
                    <div class="action-btns">
                        <button class="btn-icon" onclick="editNode('${node.id}')" title="編輯書籤">✏️</button>
                        <button class="btn-icon del" onclick="deleteNode('${node.id}')" title="刪除">🗑️</button>
                    </div>`;
                container.appendChild(el);
            }
        });
        setupSortable();
    }

    // --- 核心更新功能 ---
    function editNode(id) {
        // 在樹狀結構中找到目標
        const findNode = (list) => {
            for (let n of list) {
                if (n.id === id) return n;
                if (n.children) {
                    const found = findNode(n.children);
                    if (found) return found;
                }
            }
            return null;
        };
        const node = findNode(bookmarkTree);
        if (!node) return;

        if (node.type === 'folder') {
            const newName = prompt("修改資料夾名稱:", node.name);
            if (newName && newName !== node.name) {
                node.name = newName;
                refreshUI();
                syncToCloud();
            }
        } else {
            // 編輯書籤內容
            const newName = prompt("編輯名稱:", node.name);
            if (newName === null) return;
            const newUrl = prompt("編輯網址:", node.url);
            if (newUrl === null) return;
            const newTagsStr = prompt("編輯標籤 (用逗號隔開):", (node.tags || []).join(', '));
            if (newTagsStr === null) return;

            node.name = newName;
            node.url = newUrl;
            node.tags = newTagsStr.split(',').map(x => x.trim()).filter(x => x !== "");
            
            refreshUI();
            syncToCloud();
        }
    }

    async function syncToCloud() {
        updateStatus("🔄 同步中...", "info");
        const dataToSave = buildDataFromUI(rootEl);
        const { error } = await supabaseClient.from('bookmark_data').upsert({ id: 1, tree_json: dataToSave, updated_at: new Date() });
        if (!error) { updateStatus("✅ 雲端已同步", "success"); bookmarkTree = dataToSave; }
    }

    function buildDataFromUI(container) {
        return Array.from(container.children).map(el => {
            const node = { id: el.dataset.id, type: el.dataset.type, name: el.dataset.name };
            if (node.type === 'folder') node.children = buildDataFromUI(el.querySelector('.folder-children'));
            else { node.url = el.dataset.url; node.tags = JSON.parse(el.dataset.tags || "[]"); }
            return node;
        });
    }

    function setupSortable() {
        document.querySelectorAll('.folder-children').forEach(el => {
            new Sortable(el, { group: 'nested', animation: 150, ghostClass: 'ghost', onEnd: syncToCloud });
        });
    }

    function addNewItem(type) {
        const name = prompt("名稱:");
        if (!name) return;
        const newItem = { id: 'idx_' + Date.now(), type: type, name: name };
        if (type === 'link') {
            newItem.url = prompt("網址:", "https://");
            const t = prompt("標籤 (逗號隔開):");
            newItem.tags = t ? t.split(',').map(x => x.trim()).filter(x => x !== "") : [];
        } else newItem.children = [];
        bookmarkTree.unshift(newItem);
        refreshUI();
        syncToCloud();
    }

    function deleteNode(id) {
        if (confirm("確定刪除？")) {
            const remove = (list) => {
                const i = list.findIndex(n => n.id === id);
                if (i > -1) { list.splice(i, 1); return true; }
                return list.some(n => n.children && remove(n.children));
            };
            remove(bookmarkTree);
            refreshUI();
            syncToCloud();
        }
    }

    function clearFilter() { activeTag = null; refreshUI(); }
    function updateStatus(t, s) { statusEl.innerText = t; statusEl.style.background = s === "success" ? "#dcfce7" : "#fee2e2"; }
    function manualSync() { syncToCloud(); }

    init();
</script>
</body>
</html>
