<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智聯書籤 - 雲端同步版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --text: #1e293b; --tag-bg: #e0f2fe; --tag-text: #0369a1; }
        body { font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .header-bar { border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .search-input { flex-grow: 1; padding: 10px 15px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; }
        .folder-node { margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc; }
        .folder-header { cursor: pointer; padding: 12px 15px; font-weight: bold; display: flex; justify-content: space-between; background: #f1f5f9; }
        .folder-children { min-height: 15px; padding: 5px 5px 10px 25px; background: white; border-top: 1px solid #f1f5f9; }
        .link-node { padding: 10px 15px; margin: 5px 0; background: white; border: 1px solid #f1f5f9; border-radius: 6px; display: flex; align-items: center; cursor: move; }
        .link-node a { text-decoration: none; color: var(--primary); font-weight: 500; flex-grow: 1; margin-right: 10px; }
        .tag { background: var(--tag-bg); color: var(--tag-text); font-size: 11px; padding: 2px 8px; border-radius: 99px; margin-left: 4px; font-weight: 600; }
        button { cursor: pointer; border: none; border-radius: 6px; padding: 8px 14px; font-size: 13px; }
        .btn-main { background: var(--primary); color: white; }
        .btn-delete { background: #fee2e2; color: #ef4444; margin-left: auto; }
        .sync-status { font-size: 12px; color: #64748b; margin-top: 5px; }
        .ghost { opacity: 0.3; background: #dbeafe !important; border: 2px dashed var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar">
        <h1>🔖 智聯書籤 (Cloud)</h1>
        <div id="status" class="sync-status">正在連線至雲端...</div>
        <input type="text" id="globalSearch" class="search-input" placeholder="搜尋名稱、網址或 #標籤..." oninput="onSearch()">
        <div class="controls">
            <button class="btn-main" onclick="addItem('folder')">+ 資料夾</button>
            <button class="btn-main" onclick="addItem('link')">+ 書籤</button>
            <button style="background: #10b981; color: white;" onclick="saveToCloud()">☁️ 手動同步</button>
        </div>
    </div>
    <div id="root-container" class="folder-children" data-id="root"></div>
</div>

<script>
    // --- 1. 配置 Supabase ---
    const SUPABASE_URL = 'https://qnceyxqpkqvjucalufma.supabase.com';
    const SUPABASE_KEY = 'sb_publishable_3CSAHSwlwROSPgZJ0kdDTA_xP6iXDf-';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let bookmarkTree = [];
    const rootElement = document.getElementById('root-container');
    const statusEl = document.getElementById('status');

    // --- 2. 核心邏輯：雲端讀取 ---
    async function initSystem() {
        try {
            statusEl.innerText = "正在從雲端載入資料...";
            const { data, error } = await supabaseClient
                .from('bookmark_data')
                .select('tree_json')
                .eq('id', 1) // 我們固定讀取 ID 為 1 的這筆設定
                .single();

            if (error && error.code !== 'PGRST116') throw error; // PGRST116 是找不到資料，正常

            if (data) {
                bookmarkTree = data.tree_json;
                statusEl.innerText = "☁️ 雲端同步已就緒";
            } else {
                bookmarkTree = [{ id: "root_1", type: "folder", name: "我的書籤", children: [] }];
                statusEl.innerText = "🆕 已建立新書籤檔";
            }
            render(bookmarkTree, rootElement);
        } catch (err) {
            console.error(err);
            statusEl.innerText = "❌ 連線失敗，目前為離線模式";
            // 失敗時回退到 LocalStorage
            bookmarkTree = JSON.parse(localStorage.getItem('my_bookmarks_pro')) || [];
            render(bookmarkTree, rootElement);
        }
    }

    // --- 3. 核心邏輯：雲端儲存 ---
    async function saveToCloud() {
        const tree = buildTreeFromDOM(rootElement);
        statusEl.innerText = "⏳ 同步中...";
        
        const { error } = await supabaseClient
            .from('bookmark_data')
            .upsert({ id: 1, tree_json: tree, updated_at: new Date() });

        if (error) {
            statusEl.innerText = "❌ 同步失敗: " + error.message;
        } else {
            statusEl.innerText = "✅ 已同步至雲端 (" + new Date().toLocaleTimeString() + ")";
            localStorage.setItem('my_bookmarks_pro', JSON.stringify(tree));
        }
    }

    // --- 4. UI 渲染功能 (保持不變) ---
    function render(nodes, container, keyword = "") {
        container.innerHTML = '';
        nodes.forEach(node => {
            const lowKey = keyword.toLowerCase();
            const isMatch = node.name.toLowerCase().includes(lowKey) || 
                            (node.url && node.url.toLowerCase().includes(lowKey)) ||
                            (node.tags && node.tags.some(t => t.toLowerCase().includes(lowKey)));

            if (node.type === 'folder') {
                const el = document.createElement('div');
                el.className = 'folder-node';
                el.dataset.id = node.id;
                el.dataset.type = 'folder';
                el.dataset.name = node.name;
                el.innerHTML = `<div class="folder-header"><span>📂 ${node.name}</span><button class="btn-delete" onclick="deleteItem('${node.id}')">刪</button></div><div class="folder-children"></div>`;
                const childContainer = el.querySelector('.folder-children');
                render(node.children, childContainer, keyword);
                if (keyword && !isMatch && childContainer.innerHTML === '') return;
                container.appendChild(el);
            } else {
                if (keyword && !isMatch) return;
                const el = document.createElement('div');
                el.className = 'link-node';
                el.dataset.id = node.id; el.dataset.type = 'link'; el.dataset.name = node.name;
                el.dataset.url = node.url; el.dataset.tags = JSON.stringify(node.tags || []);
                const tagsHtml = (node.tags || []).map(t => `<span class="tag">#${t}</span>`).join('');
                el.innerHTML = `<span>🔗</span><a href="${node.url}" target="_blank">${node.name}</a><div style="display:flex;">${tagsHtml}</div><button class="btn-delete" onclick="deleteItem('${node.id}')">刪</button>`;
                container.appendChild(el);
            }
        });
        initSortable();
    }

    function initSortable() {
        document.querySelectorAll('.folder-children').forEach(el => {
            new Sortable(el, { group: 'nested', animation: 150, ghostClass: 'ghost', onEnd: saveToCloud });
        });
    }

    function buildTreeFromDOM(container) {
        return Array.from(container.children).map(el => {
            const item = { id: el.dataset.id, type: el.dataset.type, name: el.dataset.name };
            if (item.type === 'folder') {
                item.children = buildTreeFromDOM(el.querySelector('.folder-children'));
            } else {
                item.url = el.dataset.url;
                item.tags = JSON.parse(el.dataset.tags || "[]");
            }
            return item;
        });
    }

    // --- 5. 操作功能 ---
    function addItem(type) {
        const name = prompt(type === 'folder' ? "名稱:" : "名稱:");
        if (!name) return;
        const newItem = { id: 'id_' + Date.now(), type: type, name: name };
        if (type === 'link') {
            newItem.url = prompt("網址:", "https://");
            const t = prompt("標籤 (逗號隔開):");
            newItem.tags = t ? t.split(',').map(x => x.trim()) : [];
        } else { newItem.children = []; }
        
        // 取得當前資料結構並更新
        const currentTree = buildTreeFromDOM(rootElement);
        currentTree.unshift(newItem);
        render(currentTree, rootElement);
        saveToCloud();
    }

    function deleteItem(id) {
        if (!confirm("確定刪除？")) return;
        const el = document.querySelector(`[data-id="${id}"]`);
        if (el) el.remove();
        saveToCloud();
    }

    function onSearch() {
        const kw = document.getElementById('globalSearch').value;
        const currentTree = buildTreeFromDOM(rootElement);
        render(currentTree, rootElement, kw);
    }

    // 啟動系統
    initSystem();
</script>
</body>
</html>
