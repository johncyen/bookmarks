<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智聯書籤系統 - Cloud Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
            --text: #1e293b;
            --folder-bg: #f8fafc;
            --tag-bg: #e0f2fe;
            --tag-text: #0369a1;
            --danger: #ef4444;
            --success: #10b981;
        }

        body { font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.5; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }

        .header-bar { border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 20px; }
        .status-badge { font-size: 12px; padding: 4px 10px; border-radius: 4px; background: #e2e8f0; color: #64748b; margin-bottom: 10px; display: inline-block; transition: all 0.3s; font-weight: 600; }
        .search-box { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .search-box:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        button { cursor: pointer; border: none; border-radius: 6px; padding: 10px 16px; font-weight: 500; transition: all 0.2s; }
        .btn-add { background: var(--primary); color: white; }
        .btn-sync { background: var(--success); color: white; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        .folder-node { margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 8px; background: var(--folder-bg); overflow: hidden; }
        .folder-header { cursor: pointer; padding: 12px 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; background: #f1f5f9; user-select: none; }
        .folder-children { min-height: 35px; padding: 5px 5px 15px 25px; background: white; border-top: 1px solid #f1f5f9; }

        .link-node { padding: 12px 15px; margin: 6px 0; background: white; border: 1px solid #f1f5f9; border-radius: 6px; display: flex; align-items: center; cursor: move; }
        .link-node:hover { border-color: var(--primary); background: #f0f7ff; }
        .link-node a { text-decoration: none; color: var(--primary); flex-grow: 1; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .tag-list { display: flex; gap: 4px; margin: 0 10px; flex-wrap: wrap; }
        .tag { background: var(--tag-bg); color: var(--tag-text); font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: bold; white-space: nowrap; }

        .btn-del { color: var(--danger); background: none; padding: 4px; font-size: 12px; }
        .ghost { opacity: 0.2; background: #dbeafe !important; border: 2px dashed var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar">
        <h1>智聯書籤系統</h1>
        <div id="syncStatus" class="status-badge">初始化中...</div>
        <input type="text" id="searchInput" class="search-box" placeholder="搜尋名稱、網址或 #標籤..." oninput="handleSearch()">
        <div class="controls">
            <button class="btn-add" onclick="addNewItem('folder')">+ 資料夾</button>
            <button class="btn-add" onclick="addNewItem('link')">+ 書籤</button>
            <button class="btn-sync" onclick="manualSync()">☁️ 立即同步</button>
        </div>
    </div>
    <div id="tree-root" class="folder-children"></div>
</div>

<script>
    const SB_URL = 'https://qnceyxqpkqvjucalufma.supabase.co';
    const SB_KEY = 'sb_publishable_3CSAHSwlwROSPgZJ0kdDTA_xP6iXDf-';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let bookmarkTree = [];
    const rootEl = document.getElementById('tree-root');
    const statusEl = document.getElementById('syncStatus');

    async function init() {
        try {
            statusEl.innerText = "⏳ 正在讀取雲端資料...";
            const { data, error } = await supabaseClient
                .from('bookmark_data')
                .select('tree_json')
                .eq('id', 1);

            if (error) throw error;

            if (data && data.length > 0) {
                bookmarkTree = data[0].tree_json;
                updateStatus("✅ 雲端同步就緒", "success");
            } else {
                bookmarkTree = [{ id: "def_1", type: "folder", name: "我的書籤", children: [] }];
                updateStatus("🆕 雲端暫無資料", "info");
            }
            render(bookmarkTree, rootEl);
        } catch (err) {
            updateStatus("❌ 讀取失敗: " + err.message, "danger");
            bookmarkTree = JSON.parse(localStorage.getItem('bk_backup')) || [{ id: "def_1", type: "folder", name: "我的書籤", children: [] }];
            render(bookmarkTree, rootEl);
        }
    }

    async function syncToCloud() {
        const currentData = buildDataFromUI(rootEl);
        updateStatus("🔄 同步中...", "info");
        
        const { error } = await supabaseClient
            .from('bookmark_data')
            .upsert({ id: 1, tree_json: currentData, updated_at: new Date() });

        if (error) {
            updateStatus("❌ 同步錯誤: " + error.message, "danger");
        } else {
            updateStatus("✅ 已同步至雲端 " + new Date().toLocaleTimeString(), "success");
            localStorage.setItem('bk_backup', JSON.stringify(currentData));
        }
    }

    function updateStatus(text, type) {
        statusEl.innerText = text;
        statusEl.style.background = type === "success" ? "#dcfce7" : type === "danger" ? "#fee2e2" : "#e2e8f0";
        statusEl.style.color = type === "success" ? "#166534" : type === "danger" ? "#991b1b" : "#64748b";
    }

    function render(nodes, container, keyword = "") {
        container.innerHTML = '';
        nodes.forEach(node => {
            const kw = keyword.toLowerCase();
            const isMatch = node.name.toLowerCase().includes(kw) || 
                            (node.url && node.url.toLowerCase().includes(kw)) ||
                            (node.tags && node.tags.some(t => t.toLowerCase().includes(kw)));

            if (node.type === 'folder') {
                const el = document.createElement('div');
                el.className = 'folder-node';
                el.dataset.id = node.id; el.dataset.type = 'folder'; el.dataset.name = node.name;
                el.innerHTML = `
                    <div class="folder-header">
                        <span>📂 ${node.name}</span>
                        <button class="btn-del" onclick="deleteNode('${node.id}')">刪除</button>
                    </div>
                    <div class="folder-children"></div>
                `;
                const childWrap = el.querySelector('.folder-children');
                render(node.children, childWrap, keyword);
                if (keyword && !isMatch && childWrap.innerHTML === '') return;
                container.appendChild(el);
            } else {
                if (keyword && !isMatch) return;
                const el = document.createElement('div');
                el.className = 'link-node';
                el.dataset.id = node.id; el.dataset.type = 'link'; el.dataset.name = node.name;
                el.dataset.url = node.url; el.dataset.tags = JSON.stringify(node.tags || []);
                const tagsHtml = (node.tags || []).map(t => `<span class="tag">#${t}</span>`).join('');
                el.innerHTML = `<span>🔗</span><a href="${node.url}" target="_blank">${node.name}</a><div class="tag-list">${tagsHtml}</div><button class="btn-del" onclick="deleteNode('${node.id}')">刪除</button>`;
                container.appendChild(el);
            }
        });
        setupSortable();
    }

    function setupSortable() {
        document.querySelectorAll('.folder-children').forEach(el => {
            new Sortable(el, { group: 'nested', animation: 150, ghostClass: 'ghost', onEnd: () => syncToCloud() });
        });
    }

    function buildDataFromUI(container) {
        return Array.from(container.children).map(el => {
            const node = { id: el.dataset.id, type: el.dataset.type, name: el.dataset.name };
            if (node.type === 'folder') {
                node.children = buildDataFromUI(el.querySelector('.folder-children'));
            } else {
                node.url = el.dataset.url;
                node.tags = JSON.parse(el.dataset.tags || "[]");
            }
            return node;
        });
    }

    function addNewItem(type) {
        const name = prompt("名稱:");
        if (!name) return;
        const newItem = { id: 'idx_' + Date.now(), type: type, name: name };
        if (type === 'link') {
            newItem.url = prompt("網址:", "https://");
            const t = prompt("標籤 (逗號隔開):");
            newItem.tags = t ? t.split(',').map(x => x.trim()).filter(x => x !== "") : [];
        } else { newItem.children = []; }
        const data = buildDataFromUI(rootEl);
        data.unshift(newItem);
        render(data, rootEl);
        syncToCloud();
    }

    function deleteNode(id) {
        if (confirm("確定刪除？")) {
            const target = document.querySelector(`[data-id="${id}"]`);
            if (target) target.remove();
            syncToCloud();
        }
    }

    function handleSearch() {
        const kw = document.getElementById('searchInput').value;
        const currentData = buildDataFromUI(rootEl);
        render(currentData, rootEl, kw);
    }

    function manualSync() { syncToCloud(); }

    init();
</script>
</body>
</html>
