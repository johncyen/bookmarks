<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智聯書籤系統 - Tag Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
            --text: #1e293b;
            --folder-bg: #f8fafc;
            --tag-bg: #e0f2fe;
            --tag-text: #0369a1;
            --tag-active: #0369a1;
            --danger: #ef4444;
            --success: #10b981;
        }

        body { font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.5; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }

        .header-bar { border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 20px; }
        .status-badge { font-size: 12px; padding: 4px 10px; border-radius: 4px; background: #e2e8f0; color: #64748b; margin-bottom: 10px; display: inline-block; font-weight: 600; }
        
        /* 標籤管理面板 */
        .tag-manager-panel { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .tag-manager-title { font-size: 14px; font-weight: bold; margin-bottom: 10px; color: #475569; display: flex; justify-content: space-between; }
        .tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag-pill { background: white; border: 1px solid #cbd5e1; padding: 4px 12px; border-radius: 99px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
        .tag-pill:hover { border-color: var(--primary); color: var(--primary); }
        .tag-pill.active { background: var(--primary); color: white; border-color: var(--primary); }
        .tag-count { font-size: 10px; opacity: 0.6; margin-left: 4px; }

        .search-box { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        button { cursor: pointer; border: none; border-radius: 6px; padding: 10px 16px; font-weight: 500; transition: all 0.2s; }
        .btn-add { background: var(--primary); color: white; }
        .btn-sync { background: var(--success); color: white; }

        .folder-node { margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 8px; background: var(--folder-bg); }
        .folder-header { cursor: pointer; padding: 12px 15px; font-weight: bold; display: flex; justify-content: space-between; background: #f1f5f9; }
        .folder-children { min-height: 35px; padding: 5px 5px 15px 25px; background: white; }

        .link-node { padding: 12px 15px; margin: 6px 0; background: white; border: 1px solid #f1f5f9; border-radius: 6px; display: flex; align-items: center; cursor: move; }
        .link-node a { text-decoration: none; color: var(--primary); flex-grow: 1; font-weight: 500; }
        .tag { background: var(--tag-bg); color: var(--tag-text); font-size: 11px; padding: 2px 8px; border-radius: 99px; margin-left: 4px; }
        .btn-del { color: var(--danger); background: none; font-size: 12px; }
        .ghost { opacity: 0.2; background: #dbeafe !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar">
        <h1>智聯書籤系統 <small style="font-size: 0.5em; color: #64748b;">v2.0 Tag Manager</small></h1>
        <div id="syncStatus" class="status-badge">初始化中...</div>
        
        <div class="tag-manager-panel">
            <div class="tag-manager-title">
                <span>🏷️ 標籤雲 (點擊過濾)</span>
                <span id="filterStatus" style="font-weight: normal; font-size: 12px; cursor: pointer; color: var(--primary);" onclick="clearTagFilter()">清除過濾</span>
            </div>
            <div id="tagCloud" class="tag-cloud">
                </div>
        </div>

        <input type="text" id="searchInput" class="search-box" placeholder="搜尋名稱、網址或輸入 #標籤..." oninput="handleSearch()">
        
        <div class="controls">
            <button class="btn-add" onclick="addNewItem('folder')">+ 資料夾</button>
            <button class="btn-add" onclick="addNewItem('link')">+ 書籤</button>
            <button class="btn-sync" onclick="manualSync()">☁️ 立即同步</button>
        </div>
    </div>
    <div id="tree-root" class="folder-children"></div>
</div>

<script>
    const SB_URL = 'https://qnceyxqpkqvjucalufma.supabase.co';
    const SB_KEY = 'sb_publishable_3CSAHSwlwROSPgZJ0kdDTA_xP6iXDf-';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let bookmarkTree = [];
    let activeTagFilter = null;
    const rootEl = document.getElementById('tree-root');
    const statusEl = document.getElementById('syncStatus');
    const tagCloudEl = document.getElementById('tagCloud');

    async function init() {
        try {
            updateStatus("⏳ 正在讀取雲端資料...", "info");
            const { data, error } = await supabaseClient.from('bookmark_data').select('tree_json').eq('id', 1);
            if (error) throw error;
            if (data && data.length > 0) {
                bookmarkTree = data[0].tree_json;
                updateStatus("✅ 雲端同步就緒", "success");
            } else {
                bookmarkTree = [{ id: "def_1", type: "folder", name: "我的書籤", children: [] }];
                updateStatus("🆕 準備建立新存檔", "info");
            }
            refreshUI();
        } catch (err) {
            updateStatus("❌ 讀取失敗: " + err.message, "danger");
            bookmarkTree = JSON.parse(localStorage.getItem('bk_backup')) || [{ id: "def_1", type: "folder", name: "我的書籤", children: [] }];
            refreshUI();
        }
    }

    // 重新渲染整個 UI (包含標籤雲)
    function refreshUI() {
        const keyword = document.getElementById('searchInput').value;
        render(bookmarkTree, rootEl, keyword, activeTagFilter);
        renderTagCloud();
    }

    // 渲染標籤雲
    function renderTagCloud() {
        const allTags = {};
        const extractTags = (nodes) => {
            nodes.forEach(n => {
                if (n.tags) n.tags.forEach(t => allTags[t] = (allTags[t] || 0) + 1);
                if (n.children) extractTags(n.children);
            });
        };
        extractTags(bookmarkTree);

        tagCloudEl.innerHTML = '';
        Object.keys(allTags).sort().forEach(tag => {
            const pill = document.createElement('div');
            pill.className = `tag-pill ${activeTagFilter === tag ? 'active' : ''}`;
            pill.innerHTML = `${tag} <span class="tag-count">${allTags[tag]}</span>`;
            pill.onclick = () => {
                activeTagFilter = (activeTagFilter === tag) ? null : tag;
                refreshUI();
            };
            tagCloudEl.appendChild(pill);
        });
    }

    function clearTagFilter() {
        activeTagFilter = null;
        document.getElementById('searchInput').value = '';
        refreshUI();
    }

    function render(nodes, container, keyword = "", tagFilter = null) {
        container.innerHTML = '';
        nodes.forEach(node => {
            const kw = keyword.toLowerCase();
            const hasTag = tagFilter ? (node.tags && node.tags.includes(tagFilter)) : true;
            const nameMatch = node.name.toLowerCase().includes(kw) || (node.url && node.url.toLowerCase().includes(kw));
            
            // 搜尋邏輯：如果輸入 # 開頭，則專門搜標籤
            const isTagSearch = kw.startsWith('#');
            const finalMatch = isTagSearch 
                ? (node.tags && node.tags.some(t => t.toLowerCase().includes(kw.substring(1))))
                : (nameMatch && hasTag);

            if (node.type === 'folder') {
                const el = document.createElement('div');
                el.className = 'folder-node';
                el.dataset.id = node.id; el.dataset.type = 'folder'; el.dataset.name = node.name;
                el.innerHTML = `<div class="folder-header"><span>📂 ${node.name}</span><button class="btn-del" onclick="deleteNode('${node.id}')">刪除</button></div><div class="folder-children"></div>`;
                const childWrap = el.querySelector('.folder-children');
                render(node.children, childWrap, keyword, tagFilter);
                
                // 如果文件夾內有匹配項，或者文件夾本身匹配
                if ((keyword || tagFilter) && childWrap.innerHTML === '' && !finalMatch) return;
                container.appendChild(el);
            } else {
                if ((keyword || tagFilter) && !finalMatch) return;
                const el = document.createElement('div');
                el.className = 'link-node';
                el.dataset.id = node.id; el.dataset.type = 'link'; el.dataset.name = node.name;
                el.dataset.url = node.url; el.dataset.tags = JSON.stringify(node.tags || []);
                const tagsHtml = (node.tags || []).map(t => `<span class="tag" onclick="filterByTag('${t}')" style="cursor:pointer">#${t}</span>`).join('');
                el.innerHTML = `<span>🔗</span><a href="${node.url}" target="_blank">${node.name}</a><div class="tag-list">${tagsHtml}</div><button class="btn-del" onclick="deleteNode('${node.id}')">刪除</button>`;
                container.appendChild(el);
            }
        });
        setupSortable();
    }

    function filterByTag(tag) {
        activeTagFilter = tag;
        refreshUI();
    }

    // --- 以下為原有核心邏輯 ---
    async function syncToCloud() {
        bookmarkTree = buildDataFromUI(rootEl); // 同步前先更新記憶體資料
        updateStatus("🔄 同步中...", "info");
        const { error } = await supabaseClient.from('bookmark_data').upsert({ id: 1, tree_json: bookmarkTree, updated_at: new Date() });
        if (error) updateStatus("❌ 同步錯誤: " + error.message, "danger");
        else {
            updateStatus("✅ 已同步至雲端 " + new Date().toLocaleTimeString(), "success");
            localStorage.setItem('bk_backup', JSON.stringify(bookmarkTree));
            renderTagCloud(); // 同步後更新標籤雲
        }
    }

    function setupSortable() {
        document.querySelectorAll('.folder-children').forEach(el => {
            new Sortable(el, { group: 'nested', animation: 150, ghostClass: 'ghost', onEnd: () => syncToCloud() });
        });
    }

    function buildDataFromUI(container) {
        return Array.from(container.children).map(el => {
            const node = { id: el.dataset.id, type: el.dataset.type, name: el.dataset.name };
            if (node.type === 'folder') node.children = buildDataFromUI(el.querySelector('.folder-children'));
            else { node.url = el.dataset.url; node.tags = JSON.parse(el.dataset.tags || "[]"); }
            return node;
        });
    }

    function addNewItem(type) {
        const name = prompt("名稱:");
        if (!name) return;
        const newItem = { id: 'idx_' + Date.now(), type: type, name: name };
        if (type === 'link') {
            newItem.url = prompt("網址:", "https://");
            const t = prompt("標籤 (多個標籤請用半形逗號隔開):");
            newItem.tags = t ? t.split(',').map(x => x.trim()).filter(x => x !== "") : [];
        } else { newItem.children = []; }
        bookmarkTree.unshift(newItem);
        refreshUI();
        syncToCloud();
    }

    function deleteNode(id) {
        if (confirm("確定刪除？")) {
            const findAndRemove = (nodes) => {
                const idx = nodes.findIndex(n => n.id === id);
                if (idx > -1) { nodes.splice(idx, 1); return true; }
                return nodes.some(n => n.children && findAndRemove(n.children));
            };
            findAndRemove(bookmarkTree);
            refreshUI();
            syncToCloud();
        }
    }

    function handleSearch() { refreshUI(); }
    function manualSync() { syncToCloud(); }
    function updateStatus(text, type) {
        statusEl.innerText = text;
        statusEl.style.background = type === "success" ? "#dcfce7" : type === "danger" ? "#fee2e2" : "#e2e8f0";
    }

    init();
</script>
</body>
</html>
